---
- name: "Install MySQL on server"
  hosts: db-server
  become: true
  
  tasks:
    - name: "Update apt cache"
      apt:
        update_cache: yes

    - name: "Install MySQL"
      apt:
        name: mysql-server
        state: present
    
    - name: "Ensure MySQL is running"
      service:
        name: mysql
        state: started
        enabled: yes

- name: "Install nginx"
  hosts: web-server
  become: true
  
  tasks:
    - name: "Update apt cache"
      apt: 
        update_cache: yes
    
    - name: "Install nginx"
      apt:
        name: nginx
        state: present

    - name: "Ensure nginx is running"
      service: 
        name: nginx
        state: started
        enabled: yes